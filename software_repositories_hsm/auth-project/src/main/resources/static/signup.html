<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 0;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }

        .card h1 {
            text-align: center;
            color: #2d2d2d;
            font-size: 26px;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e3e3e3;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
            color: #333;
        }

        input:focus { border-color: #667eea; }
        input.input-error { border-color: #e53935; }

        .field-error {
            font-size: 12px;
            color: #e53935;
            margin-top: 4px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .divider {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            margin: 22px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e3e3e3;
        }

        .link-btn {
            display: block;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        .link-btn:hover { text-decoration: underline; }

        .alert {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .alert-error   { background: #fff0f0; color: #c62828; border: 1px solid #ffcdd2; }
        .alert-success { background: #f0fff4; color: #2e7d32; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
<div class="card">
    <h1>회원가입</h1>
    <p class="subtitle">새 계정을 만들어보세요</p>

    <div class="alert alert-error"   id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <form id="signupForm" novalidate>
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="example@email.com" required>
            <div class="field-error" id="emailError">유효한 이메일 형식을 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" placeholder="홍길동" required>
            <div class="field-error" id="nameError">이름을 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" placeholder="영문·숫자 4~20자" required>
            <div class="field-error" id="usernameError">아이디는 4~20자 영문·숫자를 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="8자 이상 입력" required>
            <div class="field-error" id="passwordError">비밀번호는 8자 이상이어야 합니다.</div>
        </div>

        <button type="submit" class="btn" id="signupBtn">회원가입</button>
    </form>

    <div class="divider">또는</div>
    <a href="/index.html" class="link-btn">이미 계정이 있으신가요? 로그인하기</a>
</div>

<script>
    const errorMsg  = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const signupBtn  = document.getElementById('signupBtn');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    function setFieldError(inputId, errorId, show) {
        const input = document.getElementById(inputId);
        const error = document.getElementById(errorId);
        if (show) {
            input.classList.add('input-error');
            error.style.display = 'block';
        } else {
            input.classList.remove('input-error');
            error.style.display = 'none';
        }
    }

    function validateForm(email, name, username, password) {
        let valid = true;
        const emailRegex    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const usernameRegex = /^[a-zA-Z0-9]{4,20}$/;

        setFieldError('email',    'emailError',    !emailRegex.test(email));
        setFieldError('name',     'nameError',     name.trim().length === 0);
        setFieldError('username', 'usernameError', !usernameRegex.test(username));
        setFieldError('password', 'passwordError', password.length < 8);

        if (!emailRegex.test(email))       valid = false;
        if (name.trim().length === 0)       valid = false;
        if (!usernameRegex.test(username)) valid = false;
        if (password.length < 8)           valid = false;

        return valid;
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const name     = document.getElementById('name').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!validateForm(email, name, username, password)) return;

        signupBtn.disabled = true;
        signupBtn.textContent = '가입 처리 중...';

        try {
            const res  = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, name, username, password })
            });
            const data = await res.json();

            if (res.ok) {
                showSuccess(data.message + ' 3초 후 로그인 페이지로 이동합니다.');
                document.getElementById('signupForm').reset();
                setTimeout(() => { window.location.href = '/index.html'; }, 3000);
            } else {
                showError(data.error || '회원가입에 실패했습니다.');
            }
        } catch {
            showError('서버와 통신 중 오류가 발생했습니다.');
        } finally {
            signupBtn.disabled = false;
            signupBtn.textContent = '회원가입';
        }
    });
</script>
</body>
</html>
