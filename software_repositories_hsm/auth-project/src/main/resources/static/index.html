<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 44px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      }

      .card h1 {
        text-align: center;
        color: #2d2d2d;
        font-size: 26px;
        margin-bottom: 6px;
      }

      .subtitle {
        text-align: center;
        color: #999;
        font-size: 14px;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        margin-bottom: 6px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid #e3e3e3;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.2s;
        outline: none;
        color: #333;
      }

      input:focus {
        border-color: #667eea;
      }

      .btn {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 6px;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.88;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .divider {
        text-align: center;
        color: #bbb;
        font-size: 13px;
        margin: 22px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e3e3e3;
      }

      .link-btn {
        display: block;
        text-align: center;
        color: #667eea;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }

      .link-btn:hover {
        text-decoration: underline;
      }

      .alert {
        padding: 11px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 16px;
        display: none;
      }

      .alert-error {
        background: #fff0f0;
        color: #c62828;
        border: 1px solid #ffcdd2;
      }
      .alert-success {
        background: #f0fff4;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
      }

      /* 로그인 후 상태 표시 */
      #loggedInView {
        display: none;
        text-align: center;
      }
      #loggedInView .welcome {
        font-size: 18px;
        color: #333;
        margin-bottom: 8px;
        font-weight: 600;
      }
      #loggedInView .token-box {
        background: #f5f5f5;
        border-radius: 8px;
        padding: 12px;
        font-size: 11px;
        color: #777;
        word-break: break-all;
        margin: 16px 0;
        text-align: left;
        max-height: 80px;
        overflow-y: auto;
      }
      #loggedInView .token-label {
        font-size: 12px;
        color: #999;
        margin-bottom: 4px;
      }
      .btn-logout {
        width: 100%;
        padding: 12px;
        background: #e53935;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-logout:hover {
        opacity: 0.88;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- 로그인 폼 -->
      <div id="loginView">
        <h1>로그인</h1>
        <p class="subtitle">계정에 로그인하세요</p>

        <div class="alert alert-error" id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">아이디</label>
            <input
              type="text"
              id="username"
              placeholder="아이디를 입력하세요"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              placeholder="비밀번호를 입력하세요"
              required
            />
          </div>
          <button type="submit" class="btn" id="loginBtn">로그인</button>
        </form>

        <div class="divider">또는</div>
        <a href="/signup.html" class="link-btn"
          >계정이 없으신가요? 회원가입하기</a
        >
      </div>

      <!-- 로그인 후 상태 -->
      <div id="loggedInView">
        <h1>환영합니다!</h1>
        <p class="subtitle">로그인 상태입니다</p>
        <div class="welcome" id="welcomeMsg"></div>
        <div class="token-label">발급된 JWT 토큰</div>
        <div class="token-box" id="tokenDisplay"></div>
        <button class="btn-logout" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <script>
      const loginView = document.getElementById("loginView");
      const loggedInView = document.getElementById("loggedInView");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const loginBtn = document.getElementById("loginBtn");

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
        successMsg.style.display = "none";
      }

      function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.style.display = "block";
        errorMsg.style.display = "none";
      }

      // 이미 로그인된 상태라면 로그인 후 뷰 표시
      function checkLoginState() {
        const token = localStorage.getItem("jwt_token");
        const username = localStorage.getItem("username");
        if (token && username) {
          loginView.style.display = "none";
          loggedInView.style.display = "block";
          document.getElementById("welcomeMsg").textContent = username + "님";
          document.getElementById("tokenDisplay").textContent = token;
        }
      }

      checkLoginState();

      // 로그인 폼 제출
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;

          if (!username || !password) {
            showError("아이디와 비밀번호를 모두 입력해주세요.");
            return;
          }

          loginBtn.disabled = true;
          loginBtn.textContent = "로그인 중...";

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (res.ok) {
              // [F-2] JWT를 localStorage에 저장
              localStorage.setItem("jwt_token", data.token);
              localStorage.setItem("username", data.username);
              showSuccess(data.message);
              setTimeout(checkLoginState, 800);
            } else {
              showError(data.error || "로그인에 실패했습니다.");
            }
          } catch {
            showError("서버와 통신 중 오류가 발생했습니다.");
          } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = "로그인";
          }
        });

      // 로그아웃
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("jwt_token");
        localStorage.removeItem("username");
        loggedInView.style.display = "none";
        loginView.style.display = "block";
      });

      // API 호출 예시: 저장된 JWT를 Authorization 헤더에 실어 보내는 방법
      // fetch('/api/protected', {
      //     headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt_token') }
      // });
    </script>
  </body>
</html>
