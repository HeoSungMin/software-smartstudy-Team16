<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note != null ? note.title : '새 노트 작성'} + ' - SmartStudy'">SmartStudy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-back { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .btn-back:hover { color: white; }
        .header-title { font-size: 1.1rem; font-weight: 700; }

        .container { max-width: 800px; margin: 36px auto; padding: 0 20px; }

        .card { background: white; border-radius: 12px; padding: 24px 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px; }
        .card-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #a0aec0; margin-bottom: 12px; }

        /* 폼 */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 11px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 0.92rem; font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { height: 220px; resize: vertical; line-height: 1.6; }
        .meta-row { display: flex; gap: 12px; }
        .meta-row .form-group { flex: 1; }

        .btn-row { display: flex; gap: 12px; margin-top: 4px; }
        .btn-analyze {
            flex: 2; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-analyze:hover { opacity: 0.9; }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-save-only {
            flex: 1; padding: 14px; background: white; color: #4a5568;
            border: 2px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-save-only:hover { border-color: #667eea; color: #667eea; }
        .btn-save-only:disabled { opacity: 0.5; cursor: not-allowed; }

        #spinner { text-align: center; padding: 32px; color: #718096; font-size: 0.95rem; display: none; }
        .spinner-dot { display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
        .spinner-dot:nth-child(2) { animation-delay: 0.2s; }
        .spinner-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

        .error-box { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 14px 18px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; display: none; }

        /* 상세 뷰 */
        .note-page-title { font-size: 1.6rem; font-weight: 700; color: #2d3748; margin-bottom: 24px; }
        .original-text { line-height: 1.85; color: #4a5568; white-space: pre-wrap; word-break: break-word; }
        .ai-summary-text {
            line-height: 1.85; color: #2b6cb0; font-weight: 500;
            white-space: pre-wrap; word-break: break-word;
            background: #ebf8ff; padding: 16px 18px; border-radius: 8px; border-left: 4px solid #3182ce;
        }
        .keywords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .keyword-tag { background: #ebf4ff; color: #2b6cb0; padding: 5px 13px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; }

        .action-row { display: flex; gap: 12px; align-items: center; }
        .btn-quiz {
            display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 13px 32px; border-radius: 10px; font-size: 0.95rem;
            font-weight: 700; border: none; cursor: pointer; transition: opacity 0.2s, transform 0.2s; text-decoration: none;
        }
        .btn-quiz:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-to-list {
            display: inline-block; background: white; color: #4a5568;
            padding: 13px 28px; border-radius: 10px; font-size: 0.95rem;
            font-weight: 600; border: 2px solid #e2e8f0; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-to-list:hover { border-color: #48bb78; color: #2f855a; }

        /* 퀴즈 모달 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 16px; width: 100%; max-width: 620px; max-height: 85vh; overflow-y: auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
        .btn-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #a0aec0; line-height: 1; padding: 4px; }
        .btn-close:hover { color: #4a5568; }

        .quiz-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
        .quiz-item.prev-wrong-item { border-color: #fbd38d; background: #fffbeb; }

        .prev-wrong-badge {
            display: inline-block; background: #fef3c7; color: #92400e;
            border: 1px solid #fbbf24; padding: 2px 9px; border-radius: 4px;
            font-size: 0.72rem; font-weight: 700; margin-bottom: 8px;
        }
        .q-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
        .q-label.label-ox { color: #6b46c1; }
        .q-label.label-short { color: #2f855a; }
        .q-text { font-weight: 500; line-height: 1.55; margin-bottom: 14px; }

        .ox-btns { display: flex; gap: 10px; }
        .ox-btns button { flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; background: white; transition: all 0.15s; }
        .ox-btns button:hover:not(:disabled) { background: #f7fafc; }
        .ox-btns button:disabled { cursor: not-allowed; opacity: 0.7; }

        .short-row { display: flex; gap: 8px; }
        .short-row input { flex: 1; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 0.9rem; outline: none; }
        .short-row input:focus { border-color: #667eea; }
        .short-row button { padding: 9px 16px; background: #667eea; color: white; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
        .short-row button:hover:not(:disabled) { opacity: 0.9; }
        .short-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; display: none; }
        .feedback.correct { background: #f0fff4; color: #2f855a; border: 1px solid #c6f6d5; }
        .feedback.wrong   { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
        .feedback.reveal  { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }

        .quiz-score { text-align: center; padding: 20px; background: #f7fafc; border-radius: 10px; margin-top: 16px; font-size: 0.95rem; color: #4a5568; display: none; }
        .quiz-score strong { color: #667eea; font-size: 1.4rem; display: block; margin-bottom: 16px; }
        .btn-save-exit {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #48bb78, #38a169);
            color: white; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-save-exit:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="header">
    <a href="/notes" class="btn-back">← 노트 목록</a>
    <span class="header-title">SmartStudy</span>
</div>

<div class="container">

    <!-- ====== 창 3-A: 새 노트 작성 폼 ====== -->
    <div th:if="${note == null}">
        <div id="formSection" class="card">
            <div class="card-label">새 노트 작성</div>
            <div class="form-group">
                <label for="noteTitle">노트 제목</label>
                <input id="noteTitle" type="text" placeholder="예: 광합성의 원리">
            </div>
            <div class="meta-row">
                <div class="form-group">
                    <label for="userId">사용자 ID</label>
                    <input id="userId" type="text" value="user01">
                </div>
                <div class="form-group">
                    <label for="subjectId">과목</label>
                    <input id="subjectId" type="text" placeholder="예: biology">
                </div>
            </div>
            <div class="form-group">
                <label for="noteContent">노트 내용</label>
                <textarea id="noteContent" placeholder="분석할 노트 내용을 입력하세요..."></textarea>
            </div>
            <div id="errorBox" class="error-box"></div>
            <div class="btn-row">
                <button class="btn-save-only" id="saveOnlyBtn" onclick="saveOnly()">💾 저장만 하기</button>
                <button class="btn-analyze" id="analyzeBtn" onclick="startAnalyze()">✨ AI 분석 시작</button>
            </div>
        </div>

        <div id="spinner">
            <span class="spinner-dot">●</span>
            <span class="spinner-dot">●</span>
            <span class="spinner-dot">●</span>
            <br><br>AI가 노트를 분석 중입니다...
        </div>
    </div>

    <!-- ====== 창 3-B: 노트 상세 ====== -->
    <div th:if="${note != null}">
        <h1 class="note-page-title" th:text="${note.title != null and !note.title.isBlank() ? note.title : '제목 없음'}">노트 제목</h1>

        <div class="card">
            <div class="card-label">원본 노트</div>
            <p class="original-text" th:text="${note.originalText}"></p>
        </div>

        <!-- AI 미분석 노트: 분석 버튼 -->
        <div th:if="${note.summary == null}">
            <div id="analyzeSpinner" style="display:none; text-align:center; padding:24px; color:#718096;">
                <span class="spinner-dot">●</span>
                <span class="spinner-dot">●</span>
                <span class="spinner-dot">●</span>
                <br><br>AI가 분석 중입니다...
            </div>
            <div id="analyzeErrorBox" class="error-box"></div>
            <div class="action-row">
                <button id="analyzeExistingBtn" class="btn-quiz" onclick="analyzeExisting()">✨ AI 분석 시작</button>
                <a href="/notes" class="btn-to-list">목록으로</a>
            </div>
        </div>

        <!-- AI 요약 (파란색) -->
        <div class="card" th:if="${note.summary != null}">
            <div class="card-label">AI 요약</div>
            <p class="ai-summary-text" th:text="${note.summary}"></p>
        </div>

        <!-- 키워드 -->
        <div class="card" th:if="${note.keywords != null and !note.keywords.isEmpty()}">
            <div class="card-label">핵심 키워드</div>
            <div class="keywords-wrap">
                <span th:each="kw : ${note.keywords}" class="keyword-tag" th:text="${kw}"></span>
            </div>
        </div>

        <!-- 퀴즈 풀기 버튼 + 목록으로 버튼 -->
        <div th:if="${note.summary != null}" class="action-row">
            <button th:if="${note.questions != null and !note.questions.isEmpty()}"
                    id="openQuizBtn" class="btn-quiz">📝 퀴즈 풀기</button>
            <a href="/notes" class="btn-to-list">✓ 저장 완료 &amp; 목록으로</a>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            var SERVER_QUIZ  = /*[[${note.questions}]]*/ [];
            var PREV_WRONG   = /*[[${note.wrongAnswerIndices}]]*/ [];
            var NOTE_ID      = /*[[${note.id}]]*/ '';
            /*]]>*/
        </script>
    </div>

</div>

<!-- ====== 창 4: 퀴즈 모달 ====== -->
<div id="quizModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h2>📝 AI 생성 퀴즈</h2>
            <button class="btn-close" onclick="closeQuiz()">✕</button>
        </div>
        <div id="quizContent"></div>
        <div id="quizScore" class="quiz-score">
            <strong id="scoreText"></strong>
            <!-- 기능 3: 저장하고 나가기 버튼 -->
            <button class="btn-save-exit" id="saveExitBtn">저장하고 나가기 →</button>
        </div>
    </div>
</div>

<script>
/* ========== 창 3-B: 기존 노트 AI 분석 ========== */
async function analyzeExisting() {
    const noteId = (typeof NOTE_ID !== 'undefined') ? NOTE_ID : '';
    if (!noteId) return;

    const btn = document.getElementById('analyzeExistingBtn');
    const spinner = document.getElementById('analyzeSpinner');
    const errBox = document.getElementById('analyzeErrorBox');

    btn.parentElement.style.display = 'none';
    errBox.style.display = 'none';
    spinner.style.display = 'block';

    try {
        const res = await fetch('/notes/' + noteId + '/analyze', { method: 'POST' });
        if (!res.ok) throw new Error('분석 실패 (' + res.status + ')');
        window.location.reload();
    } catch (err) {
        spinner.style.display = 'none';
        btn.parentElement.style.display = 'flex';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
    }
}

/* ========== 창 3-A: 저장만 하기 ========== */
async function saveOnly() {
    const title   = document.getElementById('noteTitle')?.value.trim();
    const userId  = document.getElementById('userId')?.value.trim() || 'user01';
    const subject = document.getElementById('subjectId')?.value.trim() || 'general';
    const text    = document.getElementById('noteContent')?.value.trim();

    hideError();
    if (!title) { showError('노트 제목을 입력해주세요.'); return; }
    if (!text)  { showError('노트 내용을 입력해주세요.'); return; }

    setFormLoading(true);
    try {
        const res = await fetch('/notes/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, userId, subjectId: subject, text })
        });
        if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
        window.location.href = '/notes';
    } catch (err) {
        setFormLoading(false);
        showError(err.message);
    }
}

/* ========== 창 3-A: AI 분석 시작 ========== */
async function startAnalyze() {
    const title   = document.getElementById('noteTitle')?.value.trim();
    const userId  = document.getElementById('userId')?.value.trim() || 'user01';
    const subject = document.getElementById('subjectId')?.value.trim() || 'general';
    const text    = document.getElementById('noteContent')?.value.trim();

    hideError();
    if (!title) { showError('노트 제목을 입력해주세요.'); return; }
    if (!text)  { showError('노트 내용을 입력해주세요.'); return; }

    document.getElementById('formSection').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';

    try {
        const res = await fetch('/notes/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, userId, subjectId: subject, text })
        });
        if (!res.ok) throw new Error('서버 오류 (' + res.status + ')');
        const note = await res.json();
        window.location.href = '/notes/' + note.id;
    } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';
        showError(err.message);
    }
}

function setFormLoading(on) {
    document.getElementById('analyzeBtn').disabled = on;
    document.getElementById('saveOnlyBtn').disabled = on;
}
function showError(msg) {
    const b = document.getElementById('errorBox');
    if (!b) return;
    b.textContent = msg; b.style.display = 'block';
}
function hideError() {
    const b = document.getElementById('errorBox');
    if (b) b.style.display = 'none';
}

/* ========== 창 4: 퀴즈 모달 ========== */
var _wrongIndices = [];

function openQuiz(questions) {
    _wrongIndices = [];
    renderQuiz(questions);
    document.getElementById('quizScore').style.display = 'none';
    document.getElementById('quizModal').classList.add('open');
}

function closeQuiz() {
    document.getElementById('quizModal').classList.remove('open');
}

function renderQuiz(questions) {
    const container = document.getElementById('quizContent');
    container.innerHTML = '';

    var prevWrong = (typeof PREV_WRONG !== 'undefined' && PREV_WRONG) ? PREV_WRONG : [];

    questions.forEach(function(q, i) {
        const wasPrevWrong = prevWrong.indexOf(i) !== -1;
        const isOX = q.type === 'ox';

        const item = document.createElement('div');
        item.className = 'quiz-item' + (wasPrevWrong ? ' prev-wrong-item' : '');
        item.dataset.answer = q.answer;
        item.dataset.type   = q.type;
        item.dataset.index  = i;
        item.dataset.wasCorrect = '';

        let inner = '';
        if (wasPrevWrong) {
            inner += '<div class="prev-wrong-badge">⚠ 이전에 틀린 문제</div>';
        }
        inner += '<div class="q-label ' + (isOX ? 'label-ox' : 'label-short') + '">'
               + (isOX ? 'O / X' : '단답형') + ' — Q' + (i + 1)
               + '</div>'
               + '<div class="q-text">' + escHtml(q.question) + '</div>';

        if (isOX) {
            inner += '<div class="ox-btns"><button data-val="O">O</button><button data-val="X">X</button></div>';
        } else {
            inner += '<div class="short-row"><input type="text" placeholder="답을 입력하세요"><button class="check-btn">정답 확인</button></div>';
        }
        inner += '<div class="feedback"></div>';
        item.innerHTML = inner;

        if (isOX) {
            item.querySelectorAll('.ox-btns button').forEach(function(btn) {
                btn.addEventListener('click', function() { checkOX(item, btn.dataset.val); });
            });
        } else {
            item.querySelector('.check-btn').addEventListener('click', function() {
                checkShort(item, item.querySelector('input').value.trim());
            });
        }

        container.appendChild(item);
    });
}

function checkOX(item, selected) {
    const correct = item.dataset.answer;
    const isCorrect = selected === correct;
    item.dataset.wasCorrect = isCorrect ? 'true' : 'false';
    showFeedback(item, isCorrect ? 'correct' : 'wrong',
        isCorrect ? '✓ 정답입니다!' : '✗ 오답 (정답: ' + correct + ')');
    item.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
    maybeShowScore();
}

function checkShort(item, userInput) {
    const correct = item.dataset.answer;
    const isCorrect = userInput !== '' && userInput.toLowerCase() === correct.toLowerCase();
    item.dataset.wasCorrect = isCorrect ? 'true' : 'false';
    if (isCorrect) {
        showFeedback(item, 'correct', '✓ 정답입니다!');
    } else {
        showFeedback(item, 'reveal', '정답: ' + correct);
    }
    item.querySelector('.check-btn').disabled = true;
    item.querySelector('input').disabled = true;
    maybeShowScore();
}

function showFeedback(item, cls, text) {
    const fb = item.querySelector('.feedback');
    fb.className = 'feedback ' + cls;
    fb.textContent = text;
    fb.style.display = 'block';
}

function maybeShowScore() {
    const items = document.querySelectorAll('#quizContent .quiz-item');
    const answered = Array.from(items).filter(function(it) {
        return it.querySelector('.feedback').style.display !== 'none';
    });
    if (answered.length < items.length) return;

    var correctCount = 0;
    _wrongIndices = [];
    Array.from(items).forEach(function(item) {
        if (item.dataset.wasCorrect === 'true') {
            correctCount++;
        } else {
            _wrongIndices.push(parseInt(item.dataset.index));
        }
    });

    document.getElementById('scoreText').textContent = '최종 점수: ' + correctCount + ' / ' + items.length;
    document.getElementById('quizScore').style.display = 'block';
}

/* 기능 3: 저장하고 나가기 */
document.getElementById('saveExitBtn').addEventListener('click', async function() {
    var noteId = (typeof NOTE_ID !== 'undefined') ? NOTE_ID : '';
    if (noteId) {
        try {
            await fetch('/notes/' + noteId + '/quiz-result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wrongIndices: _wrongIndices })
            });
        } catch (e) { /* ignore */ }
    }
    window.location.href = '/notes';
});

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* 초기화 */
document.addEventListener('DOMContentLoaded', function() {
    var openBtn = document.getElementById('openQuizBtn');
    if (openBtn) {
        openBtn.addEventListener('click', function() {
            openQuiz(typeof SERVER_QUIZ !== 'undefined' ? SERVER_QUIZ : []);
        });
    }
    if (window.location.hash === '#quiz' && typeof SERVER_QUIZ !== 'undefined' && SERVER_QUIZ.length > 0) {
        openQuiz(SERVER_QUIZ);
    }
});
</script>
</body>
</html>
