<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">Study<span style="color:#1a1a1a">App</span></div>
    <div class="auth-subtitle">개인 학습 관리 시스템</div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-input" placeholder="아이디를 입력하세요" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;">
        로그인
      </button>
    </form>

    <div class="auth-footer">
      계정이 없으신가요? <a th:href="@{/auth/register}">회원가입</a>
    </div>
  </div>
</div>
</body>
</html>
