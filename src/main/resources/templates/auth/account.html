<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>계정 관리 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar('account')}"></div>
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">계정 관리</div>
      <div class="page-subtitle">프로필 및 보안 설정</div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="grid-2" style="gap:20px; align-items:start;">
      <!-- 프로필 수정 -->
      <div class="card">
        <div class="card-title">프로필 수정</div>
        <form th:action="@{/account/update}" method="post">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input type="text" name="name" class="form-input" th:value="${user.name}" required>
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" name="email" class="form-input" th:value="${user.email}" required>
          </div>
          <div class="form-group">
            <label class="form-label">아이디</label>
            <input type="text" class="form-input" th:value="${user.username}" disabled style="background:#f5f5f5; color:#888">
          </div>
          <button type="submit" class="btn btn-primary">저장</button>
        </form>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="card">
        <div class="card-title">비밀번호 변경</div>
        <form th:action="@{/account/password}" method="post">
          <div class="form-group">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" name="currentPassword" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호</label>
            <input type="password" name="newPassword" class="form-input" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호 확인</label>
            <input type="password" name="confirmPassword" class="form-input" required>
          </div>
          <button type="submit" class="btn btn-primary">변경</button>
        </form>
      </div>
    </div>

    <!-- 계정 삭제 -->
    <div class="card" style="margin-top:20px; border-color:#fecaca;">
      <div class="card-title" style="color:var(--danger)">위험 구역</div>
      <p style="font-size:13px; color:var(--text-sub); margin-bottom:16px;">
        계정을 삭제하면 모든 데이터(시간표, 일정)가 영구적으로 삭제되며 복구할 수 없습니다.
      </p>
      <button onclick="if(confirm('정말 계정을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) document.getElementById('deleteForm').submit()"
              class="btn btn-danger">계정 삭제</button>
      <form id="deleteForm" th:action="@{/account/delete}" method="post" style="display:none"></form>
    </div>
  </main>
</div>
</body>
</html>
