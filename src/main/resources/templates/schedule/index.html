<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시간표 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.1s;
    }
    .color-dot.selected, .color-dot:hover { border-color: #1a1a1a; transform: scale(1.15); }
    .tt-full {
      display: grid;
      grid-template-columns: 52px repeat(5, 1fr);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-width: 640px;
      position: relative;
    }
    .tt-head { background:var(--bg); border-bottom:1px solid var(--border); padding:10px 4px; text-align:center; font-weight:600; font-size:13px; color:var(--text-sub); }
    .tt-time-label { border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:4px 8px 4px 4px; font-size:10px; color:var(--text-sub); text-align:right; background:var(--bg); height:48px; }
    .tt-slot { border-right:1px solid var(--border); border-bottom:1px solid var(--border); height:48px; position:relative; cursor:pointer; transition:background 0.1s; }
    .tt-slot:hover { background: var(--accent-light); }
    .tt-slot:last-child { border-right:none; }
    .tt-block {
      position:absolute; left:2px; right:2px; border-radius:6px;
      padding:4px 7px; font-size:11px; font-weight:600;
      color:white; cursor:pointer; overflow:hidden; z-index:3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .tt-block:hover { filter:brightness(.88); box-shadow:0 4px 12px rgba(0,0,0,.2); }
    .day-col { position: relative; }
  </style>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar('schedule')}"></div>
  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="page-title">시간표</div>
        <div class="page-subtitle">수업 블록을 클릭하면 메모를 작성할 수 있습니다</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ 수업 추가</button>
    </div>

    <div class="card">
      <div style="overflow-x:auto">
        <div class="tt-full" id="timetable">
          <div class="tt-head"></div>
          <div class="tt-head">월</div>
          <div class="tt-head">화</div>
          <div class="tt-head">수</div>
          <div class="tt-head">목</div>
          <div class="tt-head">금</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 수업 추가 모달 -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">수업 추가</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">과목명</label>
      <input type="text" id="subjectName" class="form-input" placeholder="예: 알고리즘">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">교수명</label>
        <input type="text" id="professor" class="form-input" placeholder="교수명">
      </div>
      <div class="form-group">
        <label class="form-label">강의실</label>
        <input type="text" id="room" class="form-input" placeholder="예: 공학관 201">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">요일</label>
      <select id="dayOfWeek" class="form-input">
        <option value="1">월요일</option>
        <option value="2">화요일</option>
        <option value="3">수요일</option>
        <option value="4">목요일</option>
        <option value="5">금요일</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">시작 시간</label>
        <input type="time" id="startTime" class="form-input" value="09:00">
      </div>
      <div class="form-group">
        <label class="form-label">종료 시간</label>
        <input type="time" id="endTime" class="form-input" value="10:30">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">색상</label>
      <div class="color-picker" id="colorPicker">
        <div class="color-dot selected" style="background:#2563eb" data-color="#2563eb" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#7c3aed" data-color="#7c3aed" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#db2777" data-color="#db2777" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#dc2626" data-color="#dc2626" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#d97706" data-color="#d97706" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#16a34a" data-color="#16a34a" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#0891b2" data-color="#0891b2" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#475569" data-color="#475569" onclick="selectColor(this)"></div>
      </div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" onclick="addSchedule()">추가</button>
    </div>
  </div>
</div>

<!-- 과목 메모 모달 (F-4) -->
<div class="modal-overlay" id="memoModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="memoTitle">과목 상세</div>
      <button class="modal-close" onclick="closeModal('memoModal')">×</button>
    </div>
    <div id="memoInfo" style="background:var(--bg); border-radius:8px; padding:12px; margin-bottom:16px; font-size:13px; color:var(--text-sub);"></div>
    <div class="form-group">
      <label class="form-label">📝 메모</label>
      <textarea id="memoContent" class="form-input" rows="5" placeholder="수업 관련 메모를 작성하세요..." style="resize:vertical"></textarea>
    </div>
    <div style="display:flex; gap:8px; justify-content:space-between; margin-top:8px">
      <button class="btn btn-danger btn-sm" onclick="deleteSchedule()">삭제</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="closeModal('memoModal')">닫기</button>
        <button class="btn btn-primary" onclick="saveMemo()">저장</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const schedules = /*[[${schedules}]]*/ [];
  const START_HOUR = 8, END_HOUR = 22, CELL_H = 48;
  let selectedColor = '#2563eb';
  let currentScheduleId = null;

  // 시간표 렌더링
  function renderTimetable() {
    const grid = document.getElementById('timetable');
    // 기존 슬롯 제거
    grid.querySelectorAll('.tt-time-label, .tt-slot').forEach(e => e.remove());

    for (let h = START_HOUR; h <= END_HOUR; h++) {
      const tl = document.createElement('div');
      tl.className = 'tt-time-label';
      tl.textContent = `${String(h).padStart(2,'0')}:00`;
      grid.appendChild(tl);

      for (let d = 1; d <= 5; d++) {
        const slot = document.createElement('div');
        slot.className = 'tt-slot';
        slot.dataset.hour = h; slot.dataset.day = d;
        grid.appendChild(slot);
      }
    }

    // 블록 렌더링
    schedules.forEach(s => {
      const startM = s.startHour * 60 + s.startMinute;
      const endM = s.endHour * 60 + s.endMinute;
      const top = (s.startHour - START_HOUR) * CELL_H + (s.startMinute / 60) * CELL_H;
      const height = ((endM - startM) / 60) * CELL_H;

      const refSlot = grid.querySelector(`.tt-slot[data-day="${s.dayOfWeek}"][data-hour="${START_HOUR}"]`);
      if (!refSlot) return;

      const block = document.createElement('div');
      block.className = 'tt-block';
      block.style.cssText = `background:${s.color||'#2563eb'}; top:${top}px; height:${height-3}px;`;
      block.innerHTML = `<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.subjectName}</div>
        <div style="font-weight:400;opacity:.85;font-size:10px">${s.room||''}</div>`;
      block.onclick = (e) => { e.stopPropagation(); openMemoModal(s); };

      refSlot.style.overflow = 'visible';
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:absolute;top:${top}px;height:${height}px;left:0;right:0;z-index:3;pointer-events:none;`;
      const inner = block;
      inner.style.position = 'absolute';
      inner.style.top = '0';
      wrap.style.pointerEvents = 'none';
      inner.style.pointerEvents = 'all';
      wrap.appendChild(inner);
      refSlot.appendChild(wrap);
    });
  }

  function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = el.dataset.color;
  }

  function openAddModal() { document.getElementById('addModal').classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  function openMemoModal(s) {
    currentScheduleId = s.id;
    document.getElementById('memoTitle').textContent = s.subjectName;
    document.getElementById('memoInfo').innerHTML =
      `<strong>요일:</strong> ${['','월','화','수','목','금'][s.dayOfWeek]} &nbsp;|&nbsp; 
       <strong>시간:</strong> ${String(s.startHour).padStart(2,'0')}:${String(s.startMinute).padStart(2,'0')} ~ ${String(s.endHour).padStart(2,'0')}:${String(s.endMinute).padStart(2,'0')}<br>
       <strong>교수:</strong> ${s.professor||'-'} &nbsp;|&nbsp; <strong>강의실:</strong> ${s.room||'-'}`;
    document.getElementById('memoContent').value = s.memo || '';
    document.getElementById('memoModal').classList.add('active');
  }

  async function addSchedule() {
    const name = document.getElementById('subjectName').value.trim();
    if (!name) { alert('과목명을 입력하세요.'); return; }
    const startTime = document.getElementById('startTime').value.split(':');
    const endTime = document.getElementById('endTime').value.split(':');
    const body = {
      subjectName: name,
      professor: document.getElementById('professor').value,
      room: document.getElementById('room').value,
      dayOfWeek: parseInt(document.getElementById('dayOfWeek').value),
      startHour: parseInt(startTime[0]), startMinute: parseInt(startTime[1]),
      endHour: parseInt(endTime[0]), endMinute: parseInt(endTime[1]),
      color: selectedColor
    };
    const res = await fetch('/schedule/add', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (res.ok) { const s = await res.json(); schedules.push(s); renderTimetable(); closeModal('addModal'); }
    else alert('추가 실패. 다시 시도해주세요.');
  }

  async function saveMemo() {
    const memo = document.getElementById('memoContent').value;
    const res = await fetch(`/schedule/${currentScheduleId}/memo`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({memo})
    });
    if (res.ok) {
      const updated = await res.json();
      const idx = schedules.findIndex(s => s.id === currentScheduleId);
      if (idx > -1) schedules[idx].memo = memo;
      closeModal('memoModal');
    } else alert('저장 실패.');
  }

  async function deleteSchedule() {
    if (!confirm('이 수업을 삭제하시겠습니까?')) return;
    const res = await fetch(`/schedule/${currentScheduleId}`, { method: 'DELETE' });
    if (res.ok) {
      const idx = schedules.findIndex(s => s.id === currentScheduleId);
      if (idx > -1) schedules.splice(idx, 1);
      renderTimetable();
      closeModal('memoModal');
    }
  }

  renderTimetable();
</script>
</body>
</html>
