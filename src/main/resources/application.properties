# MongoDB Atlas 연결 설정 (본인 Atlas Connection String으로 교체)
spring.data.mongodb.uri=mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER>.mongodb.net/studyapp?retryWrites=true&w=majority
spring.data.mongodb.database=studyapp

# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Session
server.servlet.session.timeout=30m

# App Name
spring.application.name=StudyApp
