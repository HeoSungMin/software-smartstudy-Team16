<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* HEAD */-->
<th:block th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' - Smart Study AI'">Smart Study AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
        rel="stylesheet"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</th:block>

<!--/* NAVBAR */-->
<nav th:fragment="navbar" class="navbar">
  <div class="nav-left">
    <a th:href="@{/recommendation}" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2bc5b4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true" style="flex-shrink:0"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Smart Study AI
    </a>
    <div class="nav-menu">
      <a th:href="@{/recommendation}"
         class="nav-item"
         th:classappend="${activePage == 'recommendation' ? ' active' : ''}">대시보드</a>
      <a href="#"
         class="nav-item"
         th:classappend="${activePage == 'notes' ? ' active' : ''}">학습 기록</a>
      <a href="#"
         class="nav-item"
         th:classappend="${activePage == 'settings' ? ' active' : ''}">설정</a>
    </div>
  </div>
  <div class="nav-user">
    <div class="nav-avatar" th:text="${#strings.substring(user.name, 0, 1)}">김</div>
    <span class="nav-name" th:text="${user.name}">김지능</span>
    <a th:href="@{/auth/logout}"
       style="margin-left:10px;font-size:12px;color:#aaa;">로그아웃</a>
  </div>
</nav>

<!--/* SIDEBAR */-->
<aside th:fragment="sidebar" class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">학습 관리</div>
    <a th:href="@{/recommendation}"
       class="sidebar-item"
       th:classappend="${activePage == 'recommendation' ? ' active' : ''}">
      <i class="ti ti-layout-dashboard"></i> 대시보드
    </a>
    <a href="#" class="sidebar-item">
      <i class="ti ti-calendar"></i> 시간표
    </a>
    <a href="#" class="sidebar-item">
      <i class="ti ti-notebook"></i> 노트 / AI 요약
    </a>
    <a th:href="@{/recommendation}"
       class="sidebar-item"
       th:classappend="${activePage == 'recommendation' ? ' active' : ''}">
      <i class="ti ti-bulb"></i> 학습 추천
      <span class="sidebar-badge" th:if="${weakCount != null and weakCount > 0}"
            th:text="${weakCount}">2</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="ti ti-clock"></i> 복습 캘린더
    </a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">통계 &amp; 소셜</div>
    <a href="#" class="sidebar-item">
      <i class="ti ti-chart-bar"></i> 학습 분석
    </a>
    <a href="#" class="sidebar-item">
      <i class="ti ti-trophy"></i> 랭킹
    </a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">설정</div>
    <a href="#" class="sidebar-item">
      <i class="ti ti-settings"></i> UI 커스터마이징
    </a>
  </div>
</aside>

</body>
</html>
