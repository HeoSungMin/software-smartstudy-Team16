<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .auth-logo-row { margin-bottom: 4px; }
    .forgot-row { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
    .forgot-link { font-size:13px; color:var(--accent); text-decoration:none; }
    .forgot-link:hover { text-decoration:underline; }
    .register-link { font-size:13px; color:var(--accent); text-decoration:none; }
    .register-link:hover { text-decoration:underline; }
    .social-icon { width:20px; height:20px; flex-shrink:0; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo-row">
      <div class="auth-logo">Study<span>App</span></div>
      <div class="auth-subtitle">개인 학습 관리 시스템</div>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- 일반 로그인 폼 -->
    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-input" placeholder="아이디를 입력하세요" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:8px">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
      </div>

      <!-- 회원가입 / 비밀번호 찾기 -->
      <div class="forgot-row" style="margin-bottom:18px">
        <a th:href="@{/auth/register}" class="register-link">회원가입</a>
        <a th:href="@{/auth/forgot-password}" class="forgot-link">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; padding:13px; font-size:15px; border-radius:10px;">
        로그인
      </button>
    </form>

    <!-- 구분선 -->
    <div class="divider">또는</div>

    <!-- 소셜 로그인 버튼 -->
    <div class="social-btn-group">

      <!-- 카카오 -->
      <a th:href="@{/oauth2/authorization/kakao}"
         class="btn btn-kakao social-btn">
        <!-- 카카오 아이콘 (SVG) -->
        <svg class="social-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.61 1.7 4.9 4.26 6.22l-.87 3.21a.25.25 0 0 0 .38.27L10.6 18c.45.05.91.08 1.4.08 4.97 0 9-3.36 9-7.5S16.97 3 12 3z" fill="#191919"/>
        </svg>
        카카오로 로그인
      </a>

      <!-- 네이버 -->
      <a th:href="@{/oauth2/authorization/naver}"
         class="btn btn-naver social-btn">
        <svg class="social-icon" viewBox="0 0 24 24" fill="none">
          <path d="M16.27 12.65L7.44 3H3v18h7.73l8.83-9.65L19 21h4V3h-4.1z" fill="white"/>
        </svg>
        네이버로 로그인
      </a>

      <!-- 구글 -->
      <a th:href="@{/oauth2/authorization/google}"
         class="btn btn-google social-btn">
        <svg class="social-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google로 로그인
      </a>
    </div>

  </div>
</div>
</body>
</html>
