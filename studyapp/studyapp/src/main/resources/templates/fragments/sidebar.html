<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar(active)" class="sidebar">
  <div class="sidebar-logo">Study<span>App</span></div>

  <div class="nav-section">메인</div>
  <a th:href="@{/dashboard}" class="nav-item" th:classappend="${active=='dashboard'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    대시보드
  </a>

  <div class="nav-section">학습</div>
  <a th:href="@{/schedule}" class="nav-item" th:classappend="${active=='schedule'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    시간표
  </a>
  <a th:href="@{/events}" class="nav-item" th:classappend="${active=='events'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    일정 관리
  </a>

  <div class="sidebar-bottom">
    <div class="user-info">
      <!-- 소셜 프로필 이미지가 있으면 표시, 없으면 이니셜 -->
      <div class="user-avatar">
        <img th:if="${user != null and user.profileImage != null}"
             th:src="${user.profileImage}" alt="프로필">
        <span th:unless="${user != null and user.profileImage != null}"
              th:text="${user != null ? #strings.substring(user.name,0,1) : 'U'}"></span>
      </div>
      <div>
        <div class="user-name" th:text="${user != null ? user.name : '사용자'}"></div>
        <div class="user-role" th:text="${user != null and user.provider != null and user.provider != 'local'} ? (user.provider + ' 계정') : '학생'"></div>
      </div>
    </div>
    <a th:href="@{/account}" class="nav-item" th:classappend="${active=='account'}?'active'" style="margin-top:4px"
       th:if="${user != null and (user.provider == null or user.provider == 'local')}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      계정 관리
    </a>
    <a th:href="@{/auth/logout}" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      로그아웃
    </a>
  </div>
</div>
</body>
</html>
