<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>링크 만료 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="width:420px; text-align:center">
    <div style="font-size:48px; margin-bottom:16px">⏱️</div>
    <div class="auth-logo" style="justify-content:center">Study<span>App</span></div>
    <div style="margin:20px 0">
      <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    </div>
    <a th:href="@{/auth/forgot-password}" class="btn btn-primary"
       style="width:100%; justify-content:center; padding:12px;">
      비밀번호 찾기 다시 하기
    </a>
    <div class="auth-footer"><a th:href="@{/auth/login}">← 로그인으로 돌아가기</a></div>
  </div>
</div>
</body>
</html>
