spring.application.name=smart-study-ai

# Server
server.port=8081

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# MongoDB Atlas (설계문서 2.3)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartstudy}

# JWT Secret (설계문서 3.2)
jwt.secret=${JWT_SECRET:change-this-secret-in-production}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=1209600000

# Mail / SMTP (설계문서 2.4)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Claude API (설계문서 2.4)
claude.api.key=${CLAUDE_API_KEY:}
claude.api.model=claude-sonnet-4-6

# Gemini API (설계문서 2.4)
gemini.api.key=${GEMINI_API_KEY:}
