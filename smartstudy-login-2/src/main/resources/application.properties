# ===== Smart Study AI — application.properties =====
server.port=8080
spring.application.name=smart-study-ai

# Thymeleaf (개발 중 캐시 비활성화)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# MongoDB Atlas (설계서 2.3)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartstudy}
spring.data.mongodb.database=smartstudy

# JWT (설계서 3.1 — N-1.2.2: 환경변수 관리)
jwt.secret=${JWT_SECRET:SmartStudyAI-16Team-SecretKey-Min256BitsLongForSecurity!!}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=1209600000

# SMTP (F-1.1.4: 가입 확인 메일)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.smartstudy=DEBUG

# ── OAuth2 소셜 로그인 ──────────────────────────────────────
# 아래 환경변수를 설정하면 해당 소셜 로그인이 자동으로 활성화됩니다.
# (OAuth2ClientRegistrationConfig.java 에서 환경변수를 읽어 동적으로 등록)
#
# Microsoft: https://portal.azure.com → 앱 등록
#   MICROSOFT_CLIENT_ID=...
#   MICROSOFT_CLIENT_SECRET=...
#
# Google: https://console.cloud.google.com → OAuth 2.0 클라이언트 ID 발급
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...

# Google: 아래 환경변수로 전달하세요 (코드에 키를 직접 쓰지 마세요)
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...

