<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study AI — 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="page-wrapper">

    <!-- ── 상단 네비 ── -->
    <nav class="top-nav">
        <div class="nav-logo">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <span>Smart Study AI</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">홈</a></li>
            <li><a href="#">기능</a></li>
            <li><a href="#">소개</a></li>
            <li><a href="#">문의</a></li>
        </ul>
        <a th:href="@{/auth/register}" class="nav-cta">회원가입</a>
    </nav>

    <!-- ── 메인 카드 ── -->
    <main class="main-area">
        <div class="login-card">

            <!-- 왼쪽: 폼 영역 -->
            <div class="card-left">

                <!-- 탭 -->
                <div class="tab-bar">
                    <button class="tab tab--active">로그인</button>
                    <a th:href="@{/auth/register}" class="tab">회원가입</a>
                </div>

                <!-- 에러 메시지 -->
                <div class="alert alert--error" th:if="${errorMsg}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span th:text="${errorMsg}"></span>
                </div>
                <div class="alert alert--success" th:if="${successMsg}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span th:text="${successMsg}"></span>
                </div>

                <!-- 폼 -->
                <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post" id="loginForm" novalidate>

                    <div class="field" th:classappend="${#fields.hasErrors('username')} ? 'field--error' : ''">
                        <div class="field-input-wrap">
                            <span class="field-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </span>
                            <input type="text"
                                   id="username"
                                   th:field="*{username}"
                                   class="field-input"
                                   placeholder="아이디 또는 이메일"
                                   autocomplete="username"
                                   autofocus>
                        </div>
                        <p class="field-error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>

                    <div class="field" th:classappend="${#fields.hasErrors('password')} ? 'field--error' : ''">
                        <div class="field-input-wrap">
                            <span class="field-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <input type="password"
                                   id="password"
                                   th:field="*{password}"
                                   class="field-input"
                                   placeholder="비밀번호"
                                   autocomplete="current-password">
                            <button type="button" class="eye-toggle" id="eyeBtn" aria-label="비밀번호 표시">
                                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <p class="field-error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="form-meta">
                        <a th:href="@{/auth/forgot-password}" class="forgot-link">비밀번호를 잊으셨나요?</a>
                        <button type="submit" class="btn-login" id="loginBtn">
                            <span class="btn-text">로그인</span>
                            <span class="btn-spinner" id="spinner" style="display:none"></span>
                        </button>
                    </div>

                </form>

                <!-- 소셜 로그인 -->
                <div class="social-divider"><span>또는 소셜 계정으로 로그인</span></div>
                <div class="social-grid">
                    <a href="/oauth2/authorization/google" class="social-btn google-btn" title="Google로 로그인">
                        <svg viewBox="0 0 24 24" width="17" height="17" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>Google</span>
                    </a>
                    <span class="social-btn microsoft-btn social-btn--soon" title="추후 지원 예정">
                        <svg viewBox="0 0 21 21" width="16" height="16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <rect x="1" y="1" width="9" height="9" fill="#c0c0c0"/>
                            <rect x="11" y="1" width="9" height="9" fill="#c0c0c0"/>
                            <rect x="1" y="11" width="9" height="9" fill="#c0c0c0"/>
                            <rect x="11" y="11" width="9" height="9" fill="#c0c0c0"/>
                        </svg>
                        <span>추후 지원 예정</span>
                    </span>
                </div>

            </div>

            <!-- 오른쪽: 커스텀 SVG 일러스트 영역 -->
            <div class="card-right">
                <div class="illust-bg"></div>
                <div class="illust-circles">
                    <div class="circle circle--lg"></div>
                    <div class="circle circle--md"></div>
                </div>
                <div class="illust-img-wrap">
                    <svg viewBox="0 0 380 300" fill="none" xmlns="http://www.w3.org/2000/svg" class="illust-svg" aria-hidden="true">
                        <!-- Laptop monitor frame -->
                        <rect x="65" y="35" width="222" height="158" rx="10" fill="white" opacity="0.92"/>
                        <!-- Screen area -->
                        <rect x="75" y="45" width="202" height="138" rx="6" fill="#EBF4F8"/>
                        <!-- Screen topbar -->
                        <rect x="75" y="45" width="202" height="24" rx="6" fill="#018ABE"/>
                        <rect x="75" y="57" width="202" height="12" fill="#018ABE"/>
                        <!-- Traffic light dots -->
                        <circle cx="89" cy="57" r="4" fill="rgba(255,255,255,0.5)"/>
                        <circle cx="102" cy="57" r="4" fill="rgba(255,255,255,0.5)"/>
                        <circle cx="115" cy="57" r="4" fill="rgba(255,255,255,0.5)"/>
                        <!-- AI badge in topbar -->
                        <rect x="228" y="51" width="38" height="14" rx="7" fill="rgba(255,255,255,0.25)"/>
                        <circle cx="239" cy="58" r="2.5" fill="rgba(255,255,255,0.85)"/>
                        <rect x="245" y="55" width="14" height="5" rx="2" fill="rgba(255,255,255,0.75)"/>

                        <!-- Progress section label -->
                        <rect x="87" y="82" width="46" height="6" rx="3" fill="#018ABE" opacity="0.4"/>
                        <!-- Progress bars -->
                        <rect x="87" y="95" width="82" height="7" rx="3.5" fill="#D6E8EE"/>
                        <rect x="87" y="95" width="60" height="7" rx="3.5" fill="#018ABE"/>
                        <rect x="87" y="109" width="82" height="7" rx="3.5" fill="#D6E8EE"/>
                        <rect x="87" y="109" width="42" height="7" rx="3.5" fill="#97CADB"/>
                        <rect x="87" y="123" width="82" height="7" rx="3.5" fill="#D6E8EE"/>
                        <rect x="87" y="123" width="70" height="7" rx="3.5" fill="#018ABE" opacity="0.85"/>
                        <!-- % text placeholders -->
                        <rect x="172" y="96" width="22" height="5" rx="2" fill="#02457A" opacity="0.45"/>
                        <rect x="132" y="110" width="22" height="5" rx="2" fill="#97CADB" opacity="0.6"/>
                        <rect x="160" y="124" width="22" height="5" rx="2" fill="#02457A" opacity="0.45"/>

                        <!-- Mini bar chart -->
                        <rect x="183" y="81" width="84" height="70" rx="6" fill="white" opacity="0.8"/>
                        <rect x="193" y="124" width="11" height="17" rx="3" fill="#018ABE" opacity="0.5"/>
                        <rect x="209" y="115" width="11" height="26" rx="3" fill="#018ABE" opacity="0.7"/>
                        <rect x="225" y="105" width="11" height="36" rx="3" fill="#018ABE"/>
                        <rect x="241" y="118" width="11" height="23" rx="3" fill="#018ABE" opacity="0.65"/>
                        <!-- Trend line -->
                        <polyline points="198,121 214,111 230,101 247,115" stroke="#02457A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="198" cy="121" r="2.5" fill="#02457A"/>
                        <circle cx="214" cy="111" r="2.5" fill="#02457A"/>
                        <circle cx="230" cy="101" r="2.5" fill="#02457A"/>
                        <circle cx="247" cy="115" r="2.5" fill="#02457A"/>

                        <!-- Screen text lines -->
                        <rect x="87" y="142" width="170" height="4" rx="2" fill="#dde1e7" opacity="0.65"/>
                        <rect x="87" y="151" width="115" height="4" rx="2" fill="#dde1e7" opacity="0.5"/>
                        <rect x="87" y="160" width="142" height="4" rx="2" fill="#dde1e7" opacity="0.55"/>

                        <!-- Laptop base / keyboard area -->
                        <path d="M52,193 L75,193 L75,201 L277,201 L277,193 L298,193 L312,213 L38,213 Z" fill="white" opacity="0.85"/>
                        <rect x="75" y="193" width="202" height="8" fill="#EBF4F8"/>
                        <!-- Trackpad -->
                        <rect x="153" y="196" width="46" height="5" rx="2.5" fill="rgba(0,0,0,0.07)"/>
                        <!-- Shadow -->
                        <ellipse cx="175" cy="215" rx="132" ry="8" fill="rgba(46,196,182,0.13)"/>

                        <!-- Stacked books (left) -->
                        <rect x="18" y="175" width="46" height="13" rx="3" fill="#018ABE"/>
                        <rect x="22" y="162" width="40" height="13" rx="3" fill="#97CADB"/>
                        <rect x="14" y="149" width="50" height="13" rx="3" fill="#02457A" opacity="0.8"/>
                        <rect x="18" y="175" width="5" height="13" rx="1.5" fill="rgba(255,255,255,0.35)"/>
                        <rect x="22" y="162" width="5" height="13" rx="1.5" fill="rgba(255,255,255,0.35)"/>
                        <rect x="14" y="149" width="5" height="13" rx="1.5" fill="rgba(255,255,255,0.35)"/>

                        <!-- Floating check card (top-right) -->
                        <rect x="298" y="55" width="72" height="62" rx="12" fill="white" opacity="0.93"/>
                        <circle cx="334" cy="78" r="15" fill="#D6E8EE"/>
                        <circle cx="334" cy="78" r="10" fill="#018ABE" opacity="0.9"/>
                        <path d="M329,78 L332.5,81.5 L339,74" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="308" y="99" width="52" height="4.5" rx="2.25" fill="#dde1e7"/>
                        <rect x="314" y="107" width="38" height="4" rx="2" fill="#dde1e7" opacity="0.65"/>

                        <!-- Graduation cap -->
                        <g transform="translate(284, 16)">
                            <polygon points="24,0 48,12 24,24 0,12" fill="#018ABE" opacity="0.9"/>
                            <polygon points="24,14 48,2 48,20 24,32 0,20 0,2" fill="#02457A" opacity="0.6"/>
                            <line x1="48" y1="12" x2="48" y2="26" stroke="#02457A" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="48" cy="28" r="4" fill="#018ABE"/>
                        </g>

                        <!-- Star sparkle (top-left) -->
                        <path d="M46,52 L48.5,44 L51,52 L59,52 L53,57 L55.5,65 L48.5,60 L41.5,65 L44,57 L38,52 Z" fill="#018ABE" opacity="0.42"/>

                        <!-- Cross sparkle (right) -->
                        <line x1="366" y1="150" x2="366" y2="165" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
                        <line x1="358.5" y1="157.5" x2="373.5" y2="157.5" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

                        <!-- Small cross sparkle (top-left area) -->
                        <line x1="30" y1="90" x2="30" y2="100" stroke="#018ABE" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
                        <line x1="25" y1="95" x2="35" y2="95" stroke="#018ABE" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

                        <!-- Dot accents -->
                        <circle cx="360" cy="88" r="5" fill="white" opacity="0.38"/>
                        <circle cx="355" cy="212" r="3.5" fill="white" opacity="0.45"/>
                        <circle cx="48" cy="232" r="3.5" fill="#018ABE" opacity="0.35"/>
                        <circle cx="310" cy="200" r="3" fill="white" opacity="0.5"/>
                        <circle cx="28" cy="128" r="4" fill="#018ABE" opacity="0.35"/>

                        <!-- Small floating note card (bottom-left) -->
                        <rect x="20" y="233" width="58" height="42" rx="9" fill="white" opacity="0.78"/>
                        <rect x="29" y="244" width="40" height="4.5" rx="2.25" fill="#018ABE" opacity="0.6"/>
                        <rect x="29" y="253" width="28" height="3.5" rx="1.75" fill="#dde1e7"/>
                        <rect x="29" y="260" width="34" height="3.5" rx="1.75" fill="#dde1e7" opacity="0.7"/>
                    </svg>
                </div>
            </div>

        </div>
    </main>

</div>

<script>
    document.getElementById('eyeBtn').addEventListener('click', function() {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            pw.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    });

    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        document.querySelector('.btn-text').style.display = 'none';
        document.getElementById('spinner').style.display = 'inline-block';
    });
</script>
</body>
</html>
