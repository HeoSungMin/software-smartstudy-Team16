<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study AI — 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="page-wrapper">

    <nav class="top-nav">
        <div class="nav-logo">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <span>Smart Study AI</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">홈</a></li>
            <li><a href="#">기능</a></li>
            <li><a href="#">소개</a></li>
            <li><a href="#">문의</a></li>
        </ul>
        <a th:href="@{/auth/login}" class="nav-cta">로그인</a>
    </nav>

    <main class="main-area">
        <div class="login-card">

            <div class="card-left" style="flex: 0 0 55%; padding: 2.5rem 3rem;">

                <div class="tab-bar">
                    <a th:href="@{/auth/login}" class="tab">로그인</a>
                    <button class="tab tab--active">회원가입</button>
                </div>

                <div class="alert alert--error" th:if="${errorMsg}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span th:text="${errorMsg}"></span>
                </div>

                <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" novalidate>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 1.5rem;">
                        <div class="field" th:classappend="${#fields.hasErrors('username')} ? 'field--error' : ''">
                            <div class="field-input-wrap">
                                <span class="field-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                </span>
                                <input type="text" th:field="*{username}" class="field-input" placeholder="아이디 (4~20자)" autocomplete="username">
                            </div>
                            <p class="field-error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                        </div>

                        <div class="field" th:classappend="${#fields.hasErrors('name')} ? 'field--error' : ''">
                            <div class="field-input-wrap">
                                <span class="field-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                </span>
                                <input type="text" th:field="*{name}" class="field-input" placeholder="이름">
                            </div>
                            <p class="field-error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                        </div>
                    </div>

                    <div class="field" th:classappend="${#fields.hasErrors('email')} ? 'field--error' : ''">
                        <div class="field-input-wrap">
                            <span class="field-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            </span>
                            <input type="email" th:field="*{email}" class="field-input" placeholder="이메일" autocomplete="email">
                        </div>
                        <p class="field-error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>

                    <div class="field" th:classappend="${#fields.hasErrors('password')} ? 'field--error' : ''">
                        <div class="field-input-wrap">
                            <span class="field-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <input type="password" th:field="*{password}" class="field-input" placeholder="비밀번호 (8자 이상)" autocomplete="new-password" oninput="checkPwStrength(this.value)">
                        </div>
                        <div class="pw-bar"><div class="pw-bar-fill" id="pwFill"></div></div>
                        <p class="field-error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="field" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'field--error' : ''">
                        <div class="field-input-wrap">
                            <span class="field-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </span>
                            <input type="password" th:field="*{confirmPassword}" class="field-input" placeholder="비밀번호 확인" autocomplete="new-password">
                        </div>
                        <p class="field-error-msg" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>

                    <button type="submit" class="btn-login" style="width:100%;margin-top:1.4rem;border-radius:10px;justify-content:center;">
                        가입하기
                    </button>
                </form>

                <!-- Google 소셜 로그인 -->
                <div class="social-divider"><span>또는 Google 계정으로 시작하기</span></div>
                <a href="/oauth2/authorization/google" class="social-btn google-btn" style="justify-content:center;width:100%;">
                    <svg viewBox="0 0 24 24" width="17" height="17" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>

                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Google로 계속하기</span>
                </a>

            </div>

<style>
.pw-bar{height:3px;background:#E0E0E0;border-radius:2px;margin-top:6px;}
.pw-bar-fill{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;}
</style>
<script>
function checkPwStrength(v) {
    const fill = document.getElementById('pwFill');
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const colors = ['','#EF4444','#F59E0B','#3B82F6','#22C55E'];
    const widths = ['0%','25%','50%','75%','100%'];
    fill.style.width = widths[s];
    fill.style.background = colors[s] || '';
}
</script>
</body>
</html>
